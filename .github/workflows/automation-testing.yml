name: Automation Tests

on:
  schedule:
    - cron: '0 7 * * *'
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run mode (no deletions)'
        required: true
        default: 'true'

jobs:
  validate-jobs:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    needs: Automation-Tests
    
    steps:
      - uses: actions/checkout@v5
      
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          
      - name: Install dependencies
        run: npm install
        
      - name: Validate and remove expired jobs
        run: |
          if [ "${{ github.event_name }}" == "schedule" ]; then
            echo "Schedule trigger — running LIVE mode..."
            node --no-deprecation tests/validate-west-company-jobs.js --delete
          elif [ "${{ github.event.inputs.dry_run }}" == "true" ]; then
            echo "Running in DRY RUN mode..."
            node --no-deprecation tests/validate-west-company-jobs.js --dry-run
          else
            echo "Running in LIVE mode (will delete expired jobs)..."
            node --no-deprecation tests/validate-west-company-jobs.js --delete
          fi
        env:
          SOLR_AUTH: ${{ secrets.SOLR_AUTH }}

  ensure-company-core:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Ensure company exists in company core
        env:
          SOLR_AUTH: ${{ secrets.SOLR_AUTH }}
        run: |
          if [ -z "$SOLR_AUTH" ]; then
            echo "❌ SOLR_AUTH secret is not set"
            exit 1
          fi

          SOLR_BASE="https://solr.peviitor.ro/solr/company"
          CIF=$(jq -r '.cif' config/company.json)
          LEGAL_NAME=$(jq -r '.legalName' config/company.json)
          BRAND=$(jq -r '.brand' config/company.json)
          WEBSITE=$(jq -r '.website' config/company.json)
          CAREER=$(jq -r '.careerUrl' config/company.json)
          DEFAULT_LOC=$(jq -r '.defaultLocation' config/company.json)
          SCRAPER_FILE=$(jq -r '.scraperFile' config/company.json)
          TODAY=$(date -u +%Y-%m-%d)

          echo "Checking if ${BRAND} (CIF: ${CIF}) exists in company core..."

          # Query Solr, save raw response for debugging
          curl -sS --user "${SOLR_AUTH}" \
            "${SOLR_BASE}/select?q=id:${CIF}&rows=1&wt=json" \
            > solr_response.json 2>&1

          echo "Raw Solr response:"
          head -c 500 solr_response.json

          # Parse numFound (0 if response is invalid)
          EXISTING=$(jq -r '.response.numFound // "0"' solr_response.json 2>/dev/null || echo "0")
          echo ""
          echo "${BRAND} count in company core: $EXISTING"

          if [ "$EXISTING" -eq "0" ]; then
            echo "${BRAND} not found — adding to company core..."

            jq -n \
              --arg id "$CIF" \
              --arg company "$LEGAL_NAME" \
              --arg brand "$BRAND" \
              --arg website "$WEBSITE" \
              --arg career "$CAREER" \
              --arg loc "$DEFAULT_LOC" \
              --arg today "$TODAY" \
              --arg scraperFile "$SCRAPER_FILE" \
              '[{id:$id,company:$company,brand:$brand,status:"activ",location:[$loc],website:[$website],career:[$career],lastScraped:$today,scraperFile:$scraperFile}]' \
              > company_data.json

            echo "Sending upsert..."
            curl -sS --user "${SOLR_AUTH}" \
              "${SOLR_BASE}/update/json?commit=true" \
              -X POST \
              -H "Content-Type: application/json" \
              --data-binary @company_data.json \
              2>&1 | head -c 500
            echo ""
          else
            echo "${BRAND} already exists in company core — no action needed"
          fi

          # Final verification
          curl -sS --user "${SOLR_AUTH}" \
            "${SOLR_BASE}/select?q=id:${CIF}&rows=1&wt=json" \
            > solr_verify.json 2>&1

          FINAL=$(jq -r '.response.numFound // "0"' solr_verify.json 2>/dev/null || echo "0")
          echo "${BRAND} count after: $FINAL"

          if [ "$FINAL" -ge "1" ] 2>/dev/null; then
            echo "✅ SUCCESS: ${BRAND} is in company core"
          else
            echo "❌ FAILED: ${BRAND} still not in company core"
            echo "Verification response:"
            head -c 500 solr_verify.json
            exit 1
          fi

          FINAL=$(solr_count)
          echo "${BRAND} count after check: ${FINAL:-"(empty/unreachable)"}"

          if [ -n "$FINAL" ] && [ "$FINAL" -ge "1" ] 2>/dev/null; then
            echo "✅ SUCCESS: ${BRAND} is in company core"
          else
            echo "❌ FAILED: ${BRAND} still not in company core"
            exit 1
          fi

  Automation-Tests:
    runs-on: ubuntu-latest
    needs: ensure-company-core
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v5
        
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          
      - name: Sync with remote
        if: github.event_name != 'pull_request'
        run: git pull origin main --rebase -X theirs

      - name: Install dependencies
        run: npm install

      - name: Run Unit Tests
        run: |
          npm run test:unit
          sed -i 's|<title>Test Report</title>|<title>Pre-scrape: Unit Tests — WEST CO IMPEX SRL</title>|;s|<h1 id="title">Test Report</h1>|<h1 id="title">Pre-scrape: Unit Tests — WEST CO IMPEX SRL</h1>|' test-report.html
          cp test-report.html docs/test-results/pre-scrape-unit.html || true
        env:
          SOLR_AUTH: ${{ secrets.SOLR_AUTH }}
          
      - name: Upload Unit Test Results
        uses: actions/upload-artifact@v7
        with:
          name: unit-test-results
          path: docs/test-results/pre-scrape-unit.html
          retention-days: 30

      - name: Run Integration Tests
        run: |
          npm run test:integration
          sed -i 's|<title>Test Report</title>|<title>Pre-scrape: Integration Tests — WEST CO IMPEX SRL</title>|;s|<h1 id="title">Test Report</h1>|<h1 id="title">Pre-scrape: Integration Tests — WEST CO IMPEX SRL</h1>|' test-report.html
          cp test-report.html docs/test-results/pre-scrape-integration.html || true
        env:
          SOLR_AUTH: ${{ secrets.SOLR_AUTH }}
          
      - name: Upload Integration Test Results
        uses: actions/upload-artifact@v7
        with:
          name: integration-test-results
          path: docs/test-results/pre-scrape-integration.html
          retention-days: 30

      - name: Run E2E Tests
        run: |
          npm run test:e2e
          sed -i 's|<title>Test Report</title>|<title>Post-scrape: E2E Tests — WEST CO IMPEX SRL</title>|;s|<h1 id="title">Test Report</h1>|<h1 id="title">Post-scrape: E2E Tests — WEST CO IMPEX SRL</h1>|' test-report.html
          cp test-report.html docs/test-results/post-scrape.html || true
        env:
          SOLR_AUTH: ${{ secrets.SOLR_AUTH }}
          
      - name: Upload E2E Test Results
        uses: actions/upload-artifact@v7
        with:
          name: e2e-test-results
          path: docs/test-results/post-scrape.html
          retention-days: 30

      - name: Run Consistency Tests
        run: |
          npm run test:consistency
          sed -i 's|<title>Test Report</title>|<title>Post-scrape: Consistency Tests — WEST CO IMPEX SRL</title>|;s|<h1 id="title">Test Report</h1>|<h1 id="title">Post-scrape: Consistency Tests — WEST CO IMPEX SRL</h1>|' test-report.html
          cp test-report.html docs/test-results/post-scrape-consistency.html || true
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SOLR_AUTH: ${{ secrets.SOLR_AUTH }}

      - name: Upload Consistency Test Results
        uses: actions/upload-artifact@v7
        with:
          name: consistency-test-results
          path: docs/test-results/post-scrape-consistency.html
          retention-days: 30

      - name: Push test results to docs/
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/test-results/
          git commit -m "[skip ci] Update test results" || echo "No changes to commit"
          git push || echo "Push failed (race condition) — will be picked up next run"